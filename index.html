<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>同棲精算アプリ</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
    <h2>💸 精算入力</h2>
    <form id="paymentForm">
        <input type="number" id="amount" placeholder="金額" required><br><br>
        <input type="text" id="desc" placeholder="内容（スーパーなど）" required><br><br>
        <button type="submit">登録する</button>
    </form>

    <script>
        const LIFF_ID = '2010609871-SfsWmyk5';
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxStvCJ239HsbNvK4MVuYXfGlvhe95Ew-ZTqwNWzbInqbpOmBdNKULYWdLy52ueup6S2g/exec';
        let userId = '';

// LIFFの初期化
        liff.init({ liffId: LIFF_ID }).then(() => {
            if (!liff.isLoggedIn()) {
                liff.login(); // ログインしていなければログイン画面へ
            } else {
                liff.getProfile().then(profile => {
                    userId = profile.userId; // LINEのユーザーIDを取得
                });
            }
        });

        // フォーム送信時の処理
        document.getElementById('paymentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const data = {
                date: new Date().toISOString().split('T')[0],
                amount: document.getElementById('amount').value,
                description: document.getElementById('desc').value,
                paid_by: userId
            };

            // GASへデータを送信
            fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify(data)
            }).then(res => res.json()).then(result => {
                alert('登録しました！');
                liff.closeWindow(); // 登録したらLINEの画面を閉じる
            });
        });
    </script>
</body>
</html>
